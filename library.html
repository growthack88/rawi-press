<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rawi Press — مكتبة الأخبار</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.lib-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.lib-head h1 { margin: 0 0 4px; font-size: 26px; }
.lib-head .sub { color: var(--text-muted); font-size: 13px; font-family: var(--f-mono); display: flex; align-items: center; gap: 10px; }

.type-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.type-tabs button {
  background: transparent; border: 0; padding: 12px 18px;
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--text-muted); position: relative; cursor: pointer;
  display: inline-flex; gap: 8px; align-items: center;
}
.type-tabs button .count { font-family: var(--f-mono); font-size: 11px; opacity: 0.6; }
.type-tabs button.active { color: var(--text); }
.type-tabs button.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--rawi-red);
}

.filter-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  margin-bottom: 24px;
}
.sort-select { min-width: 170px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; font-size: 13px; border-radius: var(--r-full);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text-2); cursor: pointer; transition: all 120ms;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink-ash); }
.chip.active { background: var(--ink-black); color: white; border-color: var(--ink-black); }

.grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

.ccard { position: relative; overflow: hidden; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-lg); transition: all 180ms; text-decoration: none; color: inherit; display: block; }
.ccard:hover { border-color: var(--ink-ash); box-shadow: var(--sh-md); transform: translateY(-2px); }
.ccard .thumb {
  aspect-ratio: 16/9; position: relative;
  background-color: #0a0a0a; background-size: cover; background-position: center;
  overflow: hidden;
}
.ccard .thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,10,0.5), transparent 45%);
}
.ccard .thumb .top-right {
  position: absolute; top: 10px; inset-inline-end: 10px;
  display: flex; gap: 6px; z-index: 2;
}
.ccard .thumb .top-left {
  position: absolute; top: 10px; inset-inline-start: 10px; z-index: 2;
  background: rgba(10,10,10,0.65); backdrop-filter: blur(8px);
  color: white; padding: 3px 8px; border-radius: 3px;
  font-family: var(--f-mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.ccard .thumb .duration {
  position: absolute; bottom: 10px; inset-inline-end: 10px; z-index: 2;
  font-family: var(--f-mono); font-size: 11px; color: white;
  background: rgba(0,0,0,0.75); padding: 3px 7px; border-radius: 3px;
  display: inline-flex; align-items: center; gap: 4px;
}
.ccard .thumb .play-big {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 200ms; background: rgba(0,0,0,0.3); z-index: 1;
}
.ccard:hover .thumb .play-big { opacity: 1; }
.ccard .thumb .play-big svg { width: 48px; height: 48px; color: white; }

.ccard .thumb .rushes-tri {
  position: absolute; top: 0; inset-inline-end: 0;
  width: 0; height: 0;
  border-top: 40px solid var(--status-exclusive);
  border-inline-start: 40px solid transparent;
  z-index: 2;
}
.ccard .thumb .rushes-lbl {
  position: absolute; top: 6px; inset-inline-end: 4px;
  font-family: var(--f-mono); font-size: 8px; font-weight: 600;
  color: white; z-index: 3; letter-spacing: 0.06em; transform: rotate(45deg);
}
[dir="rtl"] .ccard .thumb .rushes-lbl { transform: rotate(-45deg); }

.ccard .info { padding: 14px 16px; }
.ccard .eyebrow-cat {
  font-family: var(--f-sans); font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--rawi-red); font-weight: 600;
  margin-bottom: 6px;
}
.ccard h4 {
  font-size: 14px; font-weight: 500; margin: 0 0 10px;
  line-height: 1.5; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.ccard .row-meta {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; color: var(--text-muted); font-family: var(--f-mono); font-size: 11px;
}
.ccard .stats { display: flex; gap: 10px; }
.ccard .stats span { display: inline-flex; align-items: center; gap: 3px; }
.ccard .stats svg { width: 11px; height: 11px; }
.ccard .actions { display: flex; gap: 2px; }
.ccard .actions button {
  background: transparent; border: 0; color: var(--text-muted); cursor: pointer;
  width: 22px; height: 22px; border-radius: 3px;
  display: inline-flex; align-items: center; justify-content: center;
}
.ccard .actions button:hover { color: var(--rawi-red); background: var(--rawi-red-tint); }
.ccard .actions svg { width: 13px; height: 13px; }

.ccard .premium-stripe {
  padding: 8px 16px; background: rgba(184,134,11,0.08);
  border-top: 1px solid var(--rule-hairline);
  font-size: 11px; color: var(--status-exclusive);
  font-weight: 500; font-family: var(--f-mono); letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 6px;
}
.ccard .premium-stripe svg { width: 12px; height: 12px; }

.load-more { text-align: center; margin: 40px 0; }
.empty-hint { color: var(--text-muted); text-align: center; padding: 60px 20px; font-family: var(--f-serif); font-style: italic; }
</style>
</head>
<body>
<div id="app-root"></div>
<script src="assets/content.js"></script>
<script src="assets/rawi.js"></script>
<script src="assets/appshell.js"></script>
<script>
// Helpers
function pseudoStats(id) {
  // deterministic fake stats based on id
  const v = (id * 137 % 900) + 100; // 100-999
  const d = (id * 53 % 80) + 10;
  const s = (id * 19 % 50) + 5;
  return { v: v + '.' + (id % 10), d, s };
}

function cardHTML(c) {
  const catLabel = CATEGORY_LABELS[c.category];
  const stats = pseudoStats(c.id);
  const premiumStripe = c.tier === 'premium'
    ? `<div class="premium-stripe"><svg data-lucide="film"></svg>BASIC + EXTRA RUSHES${c.hasRushes ? ' · متاحة' : ''}</div>`
    : '';
  const tag = c.tier === 'premium'
    ? `<span class="tag tag-premium">PREMIUM</span>`
    : '';
  return `
    <a href="preview.html?id=${c.id}" class="ccard">
      <div class="thumb" style="background-image:url('${c.thumbnail}')">
        <span class="top-left">${catLabel.en.toUpperCase()}</span>
        ${tag ? `<div class="top-right">${tag}</div>` : ''}
        <span class="duration">▶ ${c.duration}</span>
        ${c.hasRushes ? '<div class="rushes-tri"></div><span class="rushes-lbl">RUSHES</span>' : ''}
        <div class="play-big"><svg data-lucide="play-circle"></svg></div>
      </div>
      <div class="info">
        <div class="eyebrow-cat">${catLabel.en.toUpperCase()} · ${formatDateEN(c.publishedAt)}</div>
        <h4>${c.ar.title}</h4>
        <div class="row-meta">
          <div class="stats">
            <span><svg data-lucide="eye"></svg>${stats.v}K</span>
            <span><svg data-lucide="download"></svg>${stats.d}</span>
            <span><svg data-lucide="share-2"></svg>${stats.s}</span>
          </div>
          <div class="actions">
            <button title="حفظ" onclick="event.preventDefault()"><svg data-lucide="bookmark"></svg></button>
            <button title="تحميل" onclick="event.preventDefault()"><svg data-lucide="download"></svg></button>
            <button title="مشاركة" onclick="event.preventDefault()"><svg data-lucide="share-2"></svg></button>
          </div>
        </div>
      </div>
      ${premiumStripe}
    </a>
  `;
}

function countByCat() {
  const counts = { all: RAWI_CONTENT.length };
  Object.keys(CATEGORY_LABELS).forEach(k => {
    counts[k] = RAWI_CONTENT.filter(v => v.category === k).length;
  });
  return counts;
}

const counts = countByCat();

const mainHTML = `
  <div class="lib-head">
    <div>
      <h1>مكتبة الأخبار</h1>
      <div class="sub"><span>${RAWI_CONTENT.length} قصة منشورة</span><span>·</span><span class="live-dot"></span><span>تحديث مستمر</span></div>
    </div>
    <div class="row gap-3">
      <button class="btn btn-ghost"><svg data-lucide="sliders-horizontal" style="width:14px;height:14px"></svg>فلاتر متقدمة</button>
      <button class="btn btn-ghost"><svg data-lucide="list" style="width:14px;height:14px"></svg>عرض قائمة</button>
    </div>
  </div>

  <div class="type-tabs">
    <button class="active" data-type="all">الكل <span class="count">(${counts.all})</span></button>
    <button data-type="video"><svg data-lucide="play-circle" style="width:15px;height:15px"></svg>فيديو <span class="count">(${counts.all})</span></button>
    <button data-type="text"><svg data-lucide="file-text" style="width:15px;height:15px"></svg>نصوص <span class="count">(0)</span></button>
    <button data-type="image"><svg data-lucide="image" style="width:15px;height:15px"></svg>صور <span class="count">(0)</span></button>
  </div>

  <div class="filter-bar">
    <select class="input sort-select" id="sortSel" style="height:36px">
      <option value="newest">الأحدث</option>
      <option value="oldest">الأقدم</option>
      <option value="premium">Premium أولاً</option>
    </select>
    <span class="chip active" data-cat="all">الكل (${counts.all})</span>
    ${Object.entries(CATEGORY_LABELS).map(([k,v]) => `<span class="chip" data-cat="${k}">${v.ar} (${counts[k]||0})</span>`).join('')}
    <span style="flex:1"></span>
    <span class="mono muted" id="resultCount"></span>
  </div>

  <div class="grid" id="cardGrid"></div>

  <div class="load-more">
    <button class="btn btn-ghost btn-lg">تحميل المزيد</button>
  </div>
`;

renderAppShell({ active: 'library', tier: 'gov', mainHTML });

// Filter state
let currentCat = 'all';
let currentSort = 'newest';

function render() {
  let items = [...RAWI_CONTENT];
  if (currentCat !== 'all') items = items.filter(v => v.category === currentCat);
  if (currentSort === 'newest') items.sort((a,b) => b.publishedAt.localeCompare(a.publishedAt));
  else if (currentSort === 'oldest') items.sort((a,b) => a.publishedAt.localeCompare(b.publishedAt));
  else if (currentSort === 'premium') items.sort((a,b) => (b.tier === 'premium' ? 1 : 0) - (a.tier === 'premium' ? 1 : 0));
  const grid = document.getElementById('cardGrid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-hint" style="grid-column:1/-1">لا توجد مواد مطابقة للفلاتر الحالية.</div>';
  } else {
    grid.innerHTML = items.map(cardHTML).join('');
  }
  document.getElementById('resultCount').textContent = `${items.length} من ${RAWI_CONTENT.length}`;
  lucide.createIcons();
}

document.querySelectorAll('.chip[data-cat]').forEach(ch => {
  ch.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-cat]').forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
    currentCat = ch.dataset.cat;
    render();
  });
});
document.getElementById('sortSel').addEventListener('change', (e) => {
  currentSort = e.target.value;
  render();
});
document.querySelectorAll('.type-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.type-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  });
});

render();
</script>
</body>
</html>
