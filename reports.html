<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rawi Press — تقارير الأثر</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.rep-select { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
.rep-select .input { height: 38px; min-width: 280px; }

.rep-hero {
  background: var(--paper-cream); border: 1px solid var(--border);
  border-radius: var(--r-xl); padding: 32px 36px; margin-bottom: 24px;
  position: relative;
}
.rep-hero::before {
  content: ''; position: absolute; top: 0; inset-inline-start: 36px;
  width: 48px; height: 3px; background: var(--rawi-red);
}
.rep-hero h2 { font-size: 26px; margin: 10px 0 8px; max-width: 820px; line-height: 1.35; }
.rep-hero .byline { font-family: var(--f-mono); font-size: 12px; color: var(--text-muted); letter-spacing: 0.03em; }
.rep-hero .byline strong { color: var(--ink-black); }

.rep-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 28px; border-top: 1px solid var(--border); }
.rep-metric {
  padding: 20px 24px 4px; border-inline-end: 1px solid var(--border);
}
.rep-metric:last-child { border-inline-end: 0; }
.rep-metric .lbl { font-family: var(--f-sans); font-size: 11px; letter-spacing: 0.06em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.rep-metric .val { font-family: var(--f-serif); font-size: 40px; line-height: 1; font-weight: 600; letter-spacing: -0.02em; color: var(--ink-black); }
.rep-metric .delta { font-family: var(--f-mono); font-size: 11px; color: var(--status-verified); margin-top: 6px; }

.two-col-r { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 1100px) { .two-col-r, .rep-metrics { grid-template-columns: 1fr 1fr; } .rep-metric { border-bottom: 1px solid var(--border); } }

/* Map */
.map-wrap { padding: 24px; }
.map {
  aspect-ratio: 16/10; position: relative;
  background: repeating-linear-gradient(45deg, var(--paper-cream), var(--paper-cream) 6px, var(--bg) 6px, var(--bg) 12px);
  border-radius: var(--r-lg); border: 1px solid var(--border-soft);
  overflow: hidden;
}
.map svg { width: 100%; height: 100%; display: block; }
.map .pin {
  position: absolute; transform: translate(-50%, -100%);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none;
}
.map .pin .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--rawi-red); position: relative;
}
.map .pin .dot::after {
  content: ''; position: absolute; inset: -6px;
  border: 2px solid var(--rawi-red); border-radius: 50%;
  opacity: 0; animation: ping 2s infinite;
}
@keyframes ping {
  0% { transform: scale(0.4); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}
.map .pin.small .dot { width: 7px; height: 7px; }
.map .pin .lbl {
  font-family: var(--f-mono); font-size: 10px;
  background: var(--ink-black); color: white;
  padding: 2px 6px; border-radius: 3px;
  letter-spacing: 0.03em; white-space: nowrap;
  transform: translateY(-10px);
}
.map .pin .lbl b { color: var(--rawi-red); margin-inline-end: 4px; }

.sent-bar {
  display: flex; height: 40px; border-radius: var(--r-md); overflow: hidden;
  margin: 14px 0 16px;
}
.sent-bar span { display: flex; align-items: center; justify-content: center; font-family: var(--f-mono); font-size: 11px; color: white; font-weight: 500; }
.sent-bar .pos { background: var(--status-verified); }
.sent-bar .neu { background: var(--ink-stone); }
.sent-bar .neg { background: var(--rawi-red); }
.phrase-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.phrase-pill {
  padding: 5px 10px; font-size: 12px;
  border-radius: var(--r-sm); background: var(--bg-soft);
  border: 1px solid var(--border); color: var(--text-2);
}

.channel-row {
  display: grid; grid-template-columns: 40px 1fr 1fr 80px; gap: 14px;
  align-items: center; padding: 14px 20px;
  border-bottom: 1px solid var(--border-soft);
}
.channel-row:last-child { border-bottom: 0; }
.channel-logo { width: 40px; height: 40px; border-radius: var(--r-md); background: var(--paper-linen); color: var(--text-2); display: inline-flex; align-items: center; justify-content: center; font-family: var(--f-serif); font-weight: 600; font-style: italic; }
.channel-name { font-weight: 600; font-size: 14px; }
.channel-stat { font-family: var(--f-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.channel-score { font-family: var(--f-serif); font-weight: 600; font-size: 32px; line-height: 1; color: var(--rawi-red); text-align: end; font-style: italic; }
</style>
</head>
<body>
