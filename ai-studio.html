<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rawi Press — استوديو الذكاء الاصطناعي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.ai-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.ai-head h1 { margin: 0 0 4px; font-size: 26px; }
.ai-head .usage-summary { display: flex; gap: 14px; align-items: center; font-family: var(--f-mono); font-size: 12px; color: var(--text-muted); }
.ai-head .big-bar { width: 160px; height: 4px; background: var(--paper-linen); border-radius: 2px; overflow: hidden; }
.ai-head .big-bar .fill { height: 100%; background: var(--rawi-red); width: 36%; }

.tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
@media (max-width: 1100px) { .tool-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .tool-grid { grid-template-columns: 1fr; } }

.tool-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-xl); padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
  transition: all 150ms ease;
}
.tool-card:hover { border-color: var(--ink-ash); box-shadow: var(--sh-md); }
.tool-card .head { display: flex; gap: 14px; align-items: center; }
.tool-card .t-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--rawi-red-tint); color: var(--rawi-red);
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tool-card h3 { margin: 0; font-size: 17px; flex: 1; }
.tool-card .desc { font-size: 13px; line-height: 1.65; color: var(--text-2); min-height: 44px; }
.tool-card .demo {
  background: var(--paper-cream); border-radius: var(--r-md);
  padding: 14px; min-height: 110px; border: 1px solid var(--border-soft);
}
.tool-card .card-foot { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

/* Waveform demo */
.wave { display: flex; align-items: center; gap: 2px; height: 40px; margin-bottom: 10px; }
.wave span { display: block; width: 3px; background: var(--rawi-red); border-radius: 2px; opacity: 0.85; }
.lang-pills { display: flex; gap: 6px; }
.lang-pill { font-family: var(--f-mono); font-size: 10px; padding: 3px 8px; border-radius: var(--r-sm); background: var(--bg); border: 1px solid var(--border); color: var(--text-2); display: inline-flex; align-items: center; gap: 4px; }
.lang-pill svg { width: 10px; height: 10px; }

/* Tashkeel demo */
.tash-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
.tash-pair .bx { background: var(--bg); padding: 10px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-soft); line-height: 1.7; min-height: 68px; }
.tash-pair .bx .label { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.tash-pair .bx.after { border-color: var(--rawi-red); background: var(--rawi-red-tint); }

/* Rewrite variants */
.rw-variants { display: grid; gap: 6px; font-size: 12px; }
.rw-var {
  background: var(--bg); padding: 8px 10px; border-radius: var(--r-sm);
  border: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.rw-var .t { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rw-var .c { font-family: var(--f-mono); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.rw-label { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--rawi-red); text-transform: uppercase; font-weight: 600; display: inline-block; margin-inline-end: 6px; }

/* Infographic thumbs */
.info-thumbs { display: flex; gap: 8px; }
.info-thumb {
  flex: 1; aspect-ratio: 1/1; background: white;
  border-radius: var(--r-sm); padding: 8px;
  display: flex; flex-direction: column; gap: 4px; justify-content: space-between;
  border: 1px solid var(--border);
}
.info-thumb .logo-mini { width: 14px; height: 14px; background: var(--rawi-red); border-radius: 2px; }
.info-thumb .bar1, .info-thumb .bar2 { height: 3px; background: var(--ink-black); border-radius: 1px; }
.info-thumb .bar2 { width: 60%; }
.info-thumb .numfake { font-family: var(--f-serif); font-size: 18px; font-weight: 600; color: var(--rawi-red); }
.info-thumb .chart {
  flex: 1; display: flex; align-items: flex-end; gap: 2px;
}
.info-thumb .chart span { display: block; flex: 1; background: var(--ink-black); border-radius: 1px; }

/* Translate triptych */
.tri { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; font-size: 11px; }
.tri .col { background: var(--bg); padding: 8px; border-radius: var(--r-sm); border: 1px solid var(--border-soft); line-height: 1.5; }
.tri .col .lbl { font-family: var(--f-mono); font-size: 9px; color: var(--rawi-red); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.05em; }

/* Brand before/after */
.brand-ba { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.brand-ba .ba {
  aspect-ratio: 16/10; border-radius: var(--r-sm); position: relative; overflow: hidden;
  background: linear-gradient(135deg, #3b1b1d 0%, #0a0a0a 100%);
  display: flex; align-items: flex-end; padding: 8px;
}
.brand-ba .ba .lbl { font-family: var(--f-mono); font-size: 9px; color: white; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 2px; letter-spacing: 0.05em; }
.brand-ba .ba.after .mark {
  position: absolute; top: 8px; inset-inline-start: 8px;
  background: var(--rawi-red); color: white;
  width: 18px; height: 18px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-serif); font-weight: 700; font-size: 11px; font-style: italic;
}
.brand-ba .ba.after .corner {
  position: absolute; bottom: 8px; inset-inline-end: 8px;
  height: 4px; width: 40%; background: var(--rawi-red);
}

.recent-outputs { margin-top: 24px; }
.recent-outputs h3 { font-size: 16px; margin: 0 0 14px; }
.recent-row { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 10px; }
.recent-item {
  min-width: 220px; padding: 14px; border-radius: var(--r-lg);
  background: var(--bg); border: 1px solid var(--border); flex-shrink: 0;
}
.recent-item .kind { font-family: var(--f-mono); font-size: 10px; color: var(--rawi-red); letter-spacing: 0.05em; font-weight: 600; margin-bottom: 6px; }
.recent-item .title { font-size: 13px; font-weight: 500; line-height: 1.45; margin-bottom: 10px; }
.recent-item .stamp { font-family: var(--f-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div id="app-root"></div>
<script src="assets/rawi.js"></script>
<script src="assets/appshell.js"></script>
<script>
const waveHTML = Array.from({length: 48}, (_,i) => {
  const h = 8 + Math.abs(Math.sin(i * 0.4) * 26) + Math.abs(Math.cos(i * 0.8) * 6);
  return `<span style="height:${h}px"></span>`;
}).join('');

const chartBars = Array.from({length: 8}, (_,i) => `<span style="height:${20 + Math.sin(i)*20 + 30}%"></span>`).join('');

const mainHTML = `
  <div class="ai-head">
    <div>
      <div class="eyebrow" style="margin-bottom:4px">AI NEWSROOM STUDIO · استوديو الذكاء الاصطناعي</div>
      <h1>أدوات ذكاء اصطناعي مبنية للسياق الإخباري العربي.</h1>
      <div class="muted">ستّ أدوات متكاملة تعمل على كامل محتواك — بهويتك، بصوتك، بلغتك.</div>
    </div>
    <div class="usage-summary">
      <span>استخدمت <b style="color:var(--text)">18</b>/50 من حصتك الشهرية</span>
      <div class="big-bar"><div class="fill"></div></div>
      <a href="#" class="btn btn-ghost btn-sm">ترقية الخطة</a>
    </div>
  </div>

  <div class="tool-grid">

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="mic" style="width:20px;height:20px"></svg></div>
        <h3>Voice Cloning & TTS</h3>
        <span class="tag tag-premium">PREMIUM</span>
      </div>
      <div class="desc">ارفع 2–3 دقائق من صوتك — الأداة تولّد تعليقاً صوتياً طبيعياً بأي لغة مع الحفاظ على نبرتك.</div>
      <div class="demo">
        <div class="wave">${waveHTML}</div>
        <div class="lang-pills">
          <span class="lang-pill"><svg data-lucide="play" style="fill:currentColor"></svg>AR 0:42</span>
          <span class="lang-pill"><svg data-lucide="play" style="fill:currentColor"></svg>EN 0:38</span>
          <span class="lang-pill"><svg data-lucide="play" style="fill:currentColor"></svg>UR 0:44</span>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">2/5 هذا الشهر</span>
        <button class="btn btn-primary btn-sm">ابدأ ←</button>
      </div>
    </div>

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="type" style="width:20px;height:20px"></svg></div>
        <h3>محرّك التشكيل العربي</h3>
      </div>
      <div class="desc">تشكيل أوتوماتيكي دقيق للأسماء، المصطلحات التقنية، والنصوص الإخبارية.</div>
      <div class="demo">
        <div class="tash-pair">
          <div class="bx">
            <div class="label">BEFORE</div>
            افتتح وزير الصحة المؤتمر الوطني للسرطان
          </div>
          <div class="bx after">
            <div class="label">AFTER</div>
            اِفْتَتَحَ وَزِيرُ الصِّحَّةِ الْمُؤْتَمَرَ الوَطَنِيَّ لِلسَّرَطَانِ
          </div>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">UNLIMITED</span>
        <button class="btn btn-primary btn-sm">جرّب ←</button>
      </div>
    </div>

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="edit-3" style="width:20px;height:20px"></svg></div>
        <h3>إعادة التحرير الذكية</h3>
      </div>
      <div class="desc">تحرير متوافق مع السياسة التحريرية السعودية الموحدة — تلخيص، توسيع، أو تبسيط.</div>
      <div class="demo">
        <div class="rw-variants">
          <div class="rw-var"><span class="t"><span class="rw-label">FORMAL</span>أعلنت الوزارة اليوم عن إطلاق خطة خمسية جديدة...</span><span class="c">142 كلمة</span></div>
          <div class="rw-var"><span class="t"><span class="rw-label">SOCIAL</span>خبر عاجل: خطة وطنية جديدة بـ12 مليار ريال 🇸🇦</span><span class="c">28 كلمة</span></div>
          <div class="rw-var"><span class="t"><span class="rw-label">TV-READY</span>في هذه اللحظات، أعلن معالي الوزير...</span><span class="c">65 كلمة</span></div>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">13/20 هذا الشهر</span>
        <button class="btn btn-primary btn-sm">ابدأ ←</button>
      </div>
    </div>

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="bar-chart-3" style="width:20px;height:20px"></svg></div>
        <h3>مولّد الإنفوغرافيك</h3>
      </div>
      <div class="desc">إنفوغرافيك جاهز للنشر من بيانات الخبر — بهويتك، ومُحسّن لكل منصة.</div>
      <div class="demo">
        <div class="info-thumbs">
          <div class="info-thumb">
            <div class="logo-mini"></div>
            <div class="numfake">87%</div>
            <div class="bar1"></div><div class="bar2"></div>
          </div>
          <div class="info-thumb">
            <div class="logo-mini"></div>
            <div class="chart">${chartBars}</div>
            <div class="bar2"></div>
          </div>
          <div class="info-thumb">
            <div class="logo-mini"></div>
            <div class="numfake">12.4M</div>
            <div class="bar1"></div><div class="bar2"></div>
          </div>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">3/10 هذا الشهر</span>
        <button class="btn btn-primary btn-sm">ابدأ ←</button>
      </div>
    </div>

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="languages" style="width:20px;height:20px"></svg></div>
        <h3>الترجمة الذكية</h3>
      </div>
      <div class="desc">ترجمة محسّنة للسياق الإخباري — الأوردو تفتح سوق 2 مليار مستخدم في آسيا.</div>
      <div class="demo">
        <div class="tri">
          <div class="col"><div class="lbl">العربية</div>افتتح وزير الصحة المؤتمر الوطني للسرطان.</div>
          <div class="col" dir="ltr" style="text-align:start"><div class="lbl">ENGLISH</div>Health Minister opens National Cancer Conference.</div>
          <div class="col"><div class="lbl">اردو</div>وزیر صحت نے قومی کینسر کانفرنس کا افتتاح کیا۔</div>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">UNLIMITED</span>
        <button class="btn btn-primary btn-sm">ترجم ←</button>
      </div>
    </div>

    <div class="tool-card">
      <div class="head">
        <div class="t-icon"><svg data-lucide="palette" style="width:20px;height:20px"></svg></div>
        <h3>تطبيق الهوية</h3>
      </div>
      <div class="desc">طبّق لوجو وألوان وخطوط براندك على أي محتوى تصدّره — مرة واحدة، للأبد.</div>
      <div class="demo">
        <div class="brand-ba">
          <div class="ba"><span class="lbl">BEFORE</span></div>
          <div class="ba after">
            <div class="mark">R</div>
            <div class="corner"></div>
            <span class="lbl">AFTER</span>
          </div>
        </div>
      </div>
      <div class="card-foot">
        <span class="mono muted">UNLIMITED</span>
        <button class="btn btn-primary btn-sm">طبّق ←</button>
      </div>
    </div>

  </div>

  <div class="recent-outputs">
    <div class="row" style="justify-content:space-between; margin-bottom:14px">
      <h3 style="margin:0">آخر الأعمال · RECENT AI OUTPUTS</h3>
      <a href="#" class="btn btn-text small">الأرشيف الكامل ←</a>
    </div>
    <div class="recent-row">
      ${[
        ['VOICE OVER · AR', 'فويس أوفر — مؤتمر السرطان الوطني', '14 MIN AGO · 2:47'],
        ['INFOGRAPHIC', 'نتائج الربع الأول — خطة 2026', '2H AGO · 3 VARIANTS'],
        ['TRANSLATION · EN', 'بيان وزارة الخارجية', 'TODAY 09:12 · 847 WORDS'],
        ['TASHKEEL', 'تغطية قمة الاستثمار', 'YESTERDAY · 1,240 WORDS'],
        ['REWRITE · SOCIAL', 'حزمة استثمار التقنية', 'YESTERDAY · 3 VARIANTS'],
        ['BRANDING', 'تطبيق هوية وزارة الصحة', 'APR 18 · 14 ASSETS'],
      ].map(r => `
        <div class="recent-item">
          <div class="kind">${r[0]}</div>
          <div class="title">${r[1]}</div>
          <div class="stamp">${r[2]}</div>
        </div>
      `).join('')}
    </div>
  </div>
`;

renderAppShell({ active: 'ai-studio', tier: 'gov', mainHTML });
</script>
</body>
</html>
